<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="darkreader-lock"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="row" style="gap:14px;">
    <div class="col">
      <div class="swatch" style="background:var(--cat-red);color:#fff;box-shadow:var(--glow-red);">#FF4D4D</div>
      <div class="swatch-name">Mistake</div>
      <div class="swatch-meta">--cat-red · pain, errors</div>
    </div>
    <div class="col">
      <div class="swatch" style="background:var(--cat-blue);color:#fff;box-shadow:var(--glow-blue);">#5B6CFF</div>
      <div class="swatch-name">Action</div>
      <div class="swatch-meta">--cat-blue · CTAs, brand</div>
    </div>
    <div class="col">
      <div class="swatch" style="background:var(--cat-green);color:#fff;box-shadow:var(--glow-green);">#22C55E</div>
      <div class="swatch-name">Correct</div>
      <div class="swatch-meta">--cat-green · success</div>
    </div>
    <div class="col">
      <div class="swatch" style="background:var(--cat-amber);color:#0E0E16;">#F59E0B</div>
      <div class="swatch-name">Warning</div>
      <div class="swatch-meta">--cat-amber · weak areas</div>
    </div>
  </div>
  <div class="tag" style="margin-top:6px;">Emotional flow: pain → action → correction → warning</div>
</div></body></html>
