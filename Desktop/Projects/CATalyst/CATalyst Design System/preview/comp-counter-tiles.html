<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="darkreader-lock"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="row" style="gap:14px;">
    <div style="flex:1;background:var(--bg-2);border:1px solid var(--cat-red-border);border-radius:14px;padding:18px;text-align:center;">
      <div style="font-size:36px;font-weight:800;color:var(--cat-red);font-family:var(--font-display);">26</div>
      <div style="color:var(--fg-3);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;">Pending</div>
    </div>
    <div style="flex:1;background:var(--bg-2);border:1px solid var(--cat-green-border);border-radius:14px;padding:18px;text-align:center;">
      <div style="font-size:36px;font-weight:800;color:var(--cat-green);font-family:var(--font-display);">30</div>
      <div style="color:var(--fg-3);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;">Fixed</div>
    </div>
    <div style="flex:1;background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;padding:18px;text-align:center;">
      <div style="font-size:36px;font-weight:800;color:var(--fg-1);font-family:var(--font-display);">56</div>
      <div style="color:var(--fg-3);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;">Total Logged</div>
    </div>
  </div>
  <div class="tag">Mistake-log counters · Pending (red) · Fixed (green) · Total (neutral)</div>
</div></body></html>
