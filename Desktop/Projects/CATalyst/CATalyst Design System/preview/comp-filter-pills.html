<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="darkreader-lock"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="row" style="gap:10px;">
    <button style="background:var(--cat-blue);color:#fff;border:none;padding:8px 18px;border-radius:999px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;">All</button>
    <button style="background:var(--bg-2);color:var(--fg-2);border:1px solid var(--line-2);padding:8px 18px;border-radius:999px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;">Silly</button>
    <button style="background:var(--bg-2);color:var(--fg-2);border:1px solid var(--line-2);padding:8px 18px;border-radius:999px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;">Concept</button>
    <button style="background:var(--bg-2);color:var(--fg-2);border:1px solid var(--line-2);padding:8px 18px;border-radius:999px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;">Misread</button>
    <button style="background:var(--bg-2);color:var(--fg-2);border:1px solid var(--line-2);padding:8px 18px;border-radius:999px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;">Guess</button>
    <button style="background:var(--bg-2);color:var(--fg-2);border:1px solid var(--line-2);padding:8px 18px;border-radius:999px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;">Pending</button>
  </div>
  <div class="row" style="gap:10px;">
    <button style="background:var(--cat-blue-bg);color:var(--cat-blue);border:1px solid var(--cat-blue-border);padding:8px 18px;border-radius:999px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;">⌕ Filters ›</button>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--cat-blue);background:var(--cat-blue-bg);padding:6px 12px;border-radius:999px;border:1px solid var(--cat-blue-border);">VARC</span>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--cat-blue);background:var(--cat-blue-bg);padding:6px 12px;border-radius:999px;border:1px solid var(--cat-blue-border);">VA</span>
    <span style="font-family:var(--font-mono);font-size:12px;color:var(--cat-amber);background:var(--cat-amber-bg);padding:6px 12px;border-radius:999px;border:1px solid var(--cat-amber-border);">MEDIUM</span>
  </div>
  <div class="tag">Filter pills + meta chips · subject/topic/difficulty</div>
</div></body></html>
