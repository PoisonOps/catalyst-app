<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="darkreader-lock"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="row" style="gap:14px;">
    <div style="flex:1;background:var(--bg-2);border:1.5px solid var(--cat-blue-border);border-radius:14px;padding:18px;">
      <div style="font-size:22px;margin-bottom:6px;">🎯</div>
      <div style="font-size:36px;font-weight:800;font-family:var(--font-display);">63</div>
      <div style="color:var(--fg-3);font-size:13px;">Questions Attempted</div>
    </div>
    <div style="flex:1;background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;padding:18px;">
      <div style="font-size:22px;margin-bottom:6px;">✅</div>
      <div style="font-size:36px;font-weight:800;font-family:var(--font-display);">22%</div>
      <div style="color:var(--fg-3);font-size:13px;">Overall Accuracy</div>
    </div>
  </div>
  <div class="tag">Stat tiles · emoji + big numeric + caption · optional accent border</div>
</div></body></html>
