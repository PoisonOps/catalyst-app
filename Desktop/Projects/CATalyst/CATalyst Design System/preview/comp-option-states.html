<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="darkreader-lock"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;background:var(--cat-red-bg);border:1.5px solid var(--cat-red);padding:12px 18px;border-radius:14px;box-shadow:0 0 0 4px rgba(255,77,77,0.06);">
    <div style="display:flex;align-items:center;gap:14px;"><div style="width:32px;height:32px;background:var(--cat-red);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-mono);">A</div><span style="color:var(--fg-1);">CBDE</span></div>
    <span style="font-size:12px;color:var(--cat-red);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">your answer</span>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;background:var(--cat-green-bg);border:1.5px solid var(--cat-green);padding:12px 18px;border-radius:14px;">
    <div style="display:flex;align-items:center;gap:14px;"><div style="width:32px;height:32px;background:var(--cat-green);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-mono);">C</div><span style="color:var(--fg-1);">CBED</span></div>
    <span style="font-size:12px;color:var(--cat-green);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;">correct</span>
  </div>
  <div class="tag">Wrong-answer + correct-answer states · shake on incorrect</div>
</div></body></html>
