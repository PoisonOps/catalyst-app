<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="darkreader-lock"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card" style="background:var(--bg-0);">
  <div style="width:280px;display:flex;flex-direction:column;gap:10px;background:var(--bg-1);padding:14px;border-radius:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;background:var(--cat-red-bg);border:1px solid var(--cat-red-border);border-radius:10px;padding:10px 14px;"><span style="color:var(--fg-1);font-size:13px;font-weight:600;">24 mistakes left</span><span style="color:var(--cat-red);font-size:13px;font-weight:700;">Fix →</span></div>
    <button style="background:var(--cat-blue);color:#fff;border:none;padding:12px;border-radius:12px;font-size:14px;font-weight:700;box-shadow:var(--glow-blue);cursor:pointer;">⚡ Upgrade to Pro</button>
    <div style="display:flex;align-items:center;justify-content:space-between;background:var(--cat-amber-bg);border:1px solid var(--cat-amber-border);border-radius:10px;padding:8px 14px;"><span style="color:var(--cat-amber);font-size:12px;">🕓 Trial: 2 days left</span><span style="color:var(--cat-blue);font-size:12px;font-weight:600;">Upgrade</span></div>
    <div style="background:var(--bg-2);border:1px solid var(--line-2);border-radius:10px;padding:10px 14px;">
      <div style="color:var(--fg-3);font-size:11px;text-transform:uppercase;letter-spacing:0.06em;">Today's Goal</div>
      <div style="height:4px;background:var(--bg-3);border-radius:999px;margin:8px 0;overflow:hidden;"><div style="width:45%;height:100%;background:var(--cat-blue);"></div></div>
      <div style="font-family:var(--font-mono);font-size:12px;color:var(--fg-2);">9 / 20</div>
    </div>
  </div>
  <div class="tag">Sidebar footer cluster · mistakes-left, Upgrade, trial, today's goal</div>
</div></body></html>
