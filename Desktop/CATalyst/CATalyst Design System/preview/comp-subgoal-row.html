<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="darkreader-lock"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="flex:0 0 90px;display:flex;align-items:center;gap:8px;color:var(--fg-1);font-weight:600;">📐 Quant</div>
    <div style="flex:1;height:8px;background:var(--bg-3);border-radius:999px;overflow:hidden;"><div style="width:40%;height:100%;background:var(--cat-blue);"></div></div>
    <span style="color:var(--cat-amber);">◆</span>
    <span style="font-family:var(--font-mono);font-size:13px;color:var(--fg-2);min-width:48px;">4/10 Q</span>
    <button style="width:28px;height:28px;border-radius:999px;background:var(--bg-3);border:1px solid var(--line-2);color:var(--fg-2);">−</button>
    <button style="width:28px;height:28px;border-radius:999px;background:var(--bg-3);border:1px solid var(--line-2);color:var(--fg-2);">+</button>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="flex:0 0 90px;display:flex;align-items:center;gap:8px;color:var(--fg-1);font-weight:600;">📖 VARC·RC</div>
    <div style="flex:1;height:8px;background:var(--bg-3);border-radius:999px;overflow:hidden;"><div style="width:100%;height:100%;background:var(--cat-blue);"></div></div>
    <span style="color:var(--cat-green);">✅</span>
    <span style="font-family:var(--font-mono);font-size:13px;color:var(--fg-2);min-width:48px;">1/1 sets</span>
    <button style="width:28px;height:28px;border-radius:999px;background:var(--bg-3);border:1px solid var(--line-2);color:var(--fg-2);">−</button>
    <button style="width:28px;height:28px;border-radius:999px;background:var(--bg-3);border:1px solid var(--line-2);color:var(--fg-2);">+</button>
  </div>
  <div class="tag">Today's Goal sub-row · subject · progress bar · status emoji · counter · ±</div>
</div></body></html>
