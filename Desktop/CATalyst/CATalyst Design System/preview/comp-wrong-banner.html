<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="darkreader-lock"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="background:linear-gradient(135deg,#220b10 0%,var(--bg-2) 100%);border:1px solid var(--cat-red-border);border-radius:14px;padding:20px 24px;">
    <div style="font-family:var(--font-display);font-weight:800;font-style:italic;font-size:30px;color:var(--cat-red);">✕ You got this wrong!</div>
    <div style="color:var(--cat-amber);font-size:14px;margin-top:6px;">This is costing you marks.</div>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg-2);border:1px solid var(--line-2);border-radius:12px;padding:14px 18px;">
    <div style="display:flex;align-items:center;gap:12px;"><span style="background:var(--cat-red);color:#fff;padding:6px 14px;border-radius:999px;font-weight:600;font-size:13px;">✕ Wrong</span><span style="color:var(--fg-2);">Correct: C</span></div>
    <button style="background:var(--cat-amber-bg);color:var(--cat-amber);border:1px solid var(--cat-amber-border);padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;">💡 Show Solution</button>
  </div>
  <div class="tag">Wrong-answer feedback · display headline + status row</div>
</div></body></html>
