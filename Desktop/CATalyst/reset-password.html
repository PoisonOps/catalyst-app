<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — CATalyst</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #17171a;
      --border: #2a2a2f;
      --text: #f0f0f5;
      --text2: #9898a8;
      --text3: #5c5c6e;
      --accent: #5b7af5;
      --red: #f44c60;
      --green: #34a853;
      --radius: 12px;
      --radius-sm: 8px;
      --font-body: 'DM Sans', sans-serif;
      --font-display: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }

    .brand-icon { font-size: 1.4rem; }

    .brand h1 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text);
    }

    h2 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text2);
      margin-bottom: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.78rem;
      color: var(--text2);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="password"] {
      background: #0d0d0f;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus { border-color: var(--accent); }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.8rem 1.5rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      padding: 0.7rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }

    .msg.error { background: rgba(244,76,96,0.1); border: 1px solid var(--red); color: var(--red); }
    .msg.success { background: rgba(52,168,83,0.1); border: 1px solid var(--green); color: var(--green); }
    .msg.show { display: block; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.82rem;
      color: var(--text2);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="brand-icon">⚡</span>
      <h1>CATalyst</h1>
    </div>
    <h2>Set New Password</h2>
    <p class="subtitle">Choose a password with at least 6 characters.</p>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="new-password" placeholder="••••••••" />
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="••••••••" />
    </div>

    <button class="btn" id="submit-btn">Update Password</button>
    <div class="msg" id="msg"></div>
    <a class="back-link" href="/">← Back to CATalyst</a>
  </div>

  <script>
    const PROD_URL = 'https://lvbqmaarriglqaegemgc.supabase.co';
    const PROD_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2YnFtYWFycmlnbHFhZWdlbWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NzA2MTQsImV4cCI6MjA5MzQ0NjYxNH0.o284rHiW_XCPulBUdmFSMFJftNKTCkipCJ-mTwBQjaw';

    const sb = supabase.createClient(PROD_URL, PROD_KEY, {
      auth: { detectSessionInUrl: true, persistSession: true }
    });

    const btn = document.getElementById('submit-btn');
    const msgEl = document.getElementById('msg');

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = 'msg ' + type + ' show';
    }

    async function init() {
      // Wait for Supabase to parse the recovery token from the URL hash
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        showMsg('Invalid or expired reset link. Please request a new one.', 'error');
        btn.disabled = true;
      }
    }

    btn.addEventListener('click', async () => {
      const pw = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (!pw || pw.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
      if (pw !== confirm) { showMsg('Passwords do not match.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      const { error } = await sb.auth.updateUser({ password: pw });

      if (error) {
        showMsg(error.message || 'Update failed. Try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        showMsg('Password updated! Redirecting...', 'success');
        setTimeout(() => { window.location.href = '/'; }, 1800);
      }
    });

    init();
  </script>
</body>
</html>
